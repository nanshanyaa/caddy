name: Import K-Vault

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  import:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Download sanitized K-Vault export
        run: |
          set -euo pipefail
          curl -fsSL 'http://23.81.118.203:19876/kvault-export-noworkflows-20260423-2159.tar.gz' -o /tmp/kvault-export.tar.gz
          find . -mindepth 1 -maxdepth 1 ! -name .git ! -name .github -exec rm -rf {} +
          tar -xzf /tmp/kvault-export.tar.gz -C .
          test ! -f .env
          test ! -d node_modules
          test ! -d data
          test ! -d logs

      - name: Commit imported project
        run: |
          set -euo pipefail
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          if git diff --cached --quiet; then
            echo 'No changes to import.'
            exit 0
          fi
          git commit -m 'Import K-Vault image hosting service'
          git push origin HEAD:main
